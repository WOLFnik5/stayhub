databaseChangeLog:
  - changeSet:
      id: 002-create-accommodations-table
      author: admin
      changes:
        - createTable:
            tableName: accommodations
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_accommodations
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: size
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: daily_rate
                  type: NUMERIC(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: availability
                  type: INTEGER
                  constraints:
                    nullable: false
