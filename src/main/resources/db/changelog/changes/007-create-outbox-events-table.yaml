databaseChangeLog:
  - changeSet:
      id: 007-create-outbox-events-table
      author: admin
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_outbox_events
                    nullable: false

              - column:
                  name: aggregate_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: aggregate_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: event_type
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: topic
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: event_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: attempts
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: published_at
                  type: TIMESTAMP

              - column:
                  name: last_error
                  type: TEXT

        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
